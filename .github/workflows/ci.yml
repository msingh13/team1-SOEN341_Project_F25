name: CI

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest

    # Set your demo/staging backend URL in repo Settings → Secrets → Actions
    # For local self-hosted CI, comment API_URL and use the optional "Start server" step below.
    env:
      API_URL: http://localhost:4000
      STUDENT_ID: "3"
      ORGANIZER_ID: "4"
      ADMIN_ID: "1"
      DEV_PASSWORD: "demo"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # OPTIONAL: start your server inside CI (requires your repo to have scripts)
      # - name: Install server deps
      #   run: |
      #     cd src/server
      #     npm ci
      #
      # - name: Start server
      #   run: |
      #     cd src/server
      #     npm run start &  # or: node index.js &
      #     echo "Waiting for API…"
      #     for i in {1..60}; do
      #       curl -fsS http://localhost:4000/health && break
      #       sleep 2
      #     done
      #   env:
      #     NODE_ENV: test

      - name: Run smoke tests
        run: node src/tests/smoke.cjs
